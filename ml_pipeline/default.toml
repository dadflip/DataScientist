# ---------------------------------------------------------------------------
# ÉTAPE 3 — EDA
# ---------------------------------------------------------------------------
[eda]
univariate_plots = ["auto", "hist", "kde", "box", "violin", "bar", "pie"]
bivariate_plots = ["auto", "scatter", "hexbin", "hist2d", "kde", "box", "violin", "strip", "swarm", "heatmap", "stacked_bar", "pie"]
multivariate = ["Correlation Matrix", "Pairplot"]
correlation_methods = ["pearson", "spearman", "kendall"]
palettes = ["Set1", "Set2", "Set3", "viridis", "plasma", "coolwarm", "husl"]
ts_plots = ["Line", "Scatter", "Area", "Box (par mois/année)", "Autocorrélation"]

[eda.ontology]
default_density = 40
max_density = 200
max_triplets_display = 500
max_hierarchy_nodes = 60
graph_layouts = ["spring", "kamada_kawai", "circular", "shell"]
relation_types = ["subClassOf", "domain", "range", "type", "subPropertyOf", "equivalentClass", "inverseOf"]

# ---------------------------------------------------------------------------
# ÉTAPE 4 — FEATURE ENGINEERING
# ---------------------------------------------------------------------------
[feature_eng]
math_operations = ["+", "-", "*", "/", "log(A)", "exp(A)", "sqrt(A)", "A^2", "A^B/C", "Abs(A)", "Modulo"]
text_operations = ["Lowercase", "Uppercase", "Length", "Extract Regex", "Replace", "Split & Keep N"]
date_operations = ["Year", "Month", "Day", "DayOfWeek", "Hour", "Minute", "IsWeekend"]
viz_types = ["auto", "scatter", "line", "bar", "box", "violin", "hist", "kde"]
manage_actions = ["Set Type (Meta)", "Duplicate", "Delete"]

[feature_eng.binning]
strategies = ["Equal Width (Cut)", "Equal Frequency (Qcut)", "Custom Edges"]

# ---------------------------------------------------------------------------
# ÉTAPE 5 — CLEANING
# ---------------------------------------------------------------------------
[[cleaning.missing]]
label = "Ne rien faire"
value = "none"

[[cleaning.missing]]
label = "Supprimer lignes avec NaN"
value = "drop_rows"
code = "df.dropna(subset=[col], inplace=True)"

[[cleaning.missing]]
label = "Supprimer colonne"
value = "drop_cols"
code = "df.drop(columns=[col], inplace=True)"

[[cleaning.missing]]
label = "Remplacer : Moyenne"
value = "mean"
code = "df[col].fillna(df[col].mean(), inplace=True)"

[[cleaning.missing]]
label = "Remplacer : Médiane"
value = "median"
code = "df[col].fillna(df[col].median(), inplace=True)"

[[cleaning.missing]]
label = "Remplacer : Mode"
value = "mode"
code = "df[col].fillna(df[col].mode()[0], inplace=True)"

[[cleaning.missing]]
label = "Remplacer : 0"
value = "zero"
code = "df[col].fillna(0, inplace=True)"

[[cleaning.missing]]
label = "Remplacer : Constante custom"
value = "constant"
params = { fill_value = "MISSING" }
code = "df[col].fillna(params['fill_value'], inplace=True)"

[[cleaning.missing]]
label = "Forward fill (ffill)"
value = "ffill"
params = { limit = "null" }
code = "df[col].ffill(inplace=True)"

[[cleaning.missing]]
label = "Backward fill (bfill)"
value = "bfill"
params = { limit = "null" }
code = "df[col].bfill(inplace=True)"

[[cleaning.missing]]
label = "Interpolation linéaire"
value = "interpolate_linear"
code = "df[col] = df[col].interpolate(method='linear')"

[[cleaning.missing]]
label = "Interpolation temporelle"
value = "interpolate_time"
code = "df[col] = df[col].interpolate(method='time')"

[[cleaning.missing]]
label = "KNN Imputer"
value = "knn"
params = { n_neighbors = 5, weights = "uniform" }

[[cleaning.missing]]
label = "Iterative Imputer (MICE)"
value = "mice"
params = { max_iter = 10, random_state = 42 }

[[cleaning.missing]]
label = "SimpleImputer (most_frequent)"
value = "simple_most_frequent"

[[cleaning.missing]]
label = "Flag manquant puis remplir 0"
value = "flag_and_zero"

[[cleaning.outliers]]
label = "Ne rien faire"
value = "none"

[[cleaning.outliers]]
label = "Clip IQR (×1.5)"
value = "clip_iqr"
params = { factor = 1.5 }

[[cleaning.outliers]]
label = "Clip percentile 1%–99%"
value = "clip_percentile"
params = { lower_pct = 1, upper_pct = 99 }

[[cleaning.outliers]]
label = "Supprimer lignes — IQR"
value = "drop_iqr"
params = { factor = 1.5 }

[[cleaning.outliers]]
label = "Supprimer lignes — Z-score"
value = "drop_zscore"
params = { threshold = 3.0 }

[[cleaning.outliers]]
label = "Winsorize"
value = "winsorize"
