num_leaves = { dist = "randint", low = 15, high = 128 }
max_depth = [-1, 5, 10, 15]

[optimization.search_spaces.CatBoostClassifier]
iterations = { dist = "randint", low = 50, high = 400 }
learning_rate = { dist = "uniform", loc = 0.01, scale = 0.3 }
depth = { dist = "randint", low = 3, high = 10 }
l2_leaf_reg = { dist = "uniform", loc = 1, scale = 9 }

[optimization.search_spaces.Ridge]
alpha = { dist = "uniform", loc = 0.001, scale = 100 }
solver = ["auto", "svd", "cholesky", "lsqr"]

[optimization.search_spaces.Lasso]
alpha = { dist = "uniform", loc = 0.001, scale = 10 }
max_iter = [1000, 2000, 5000]

[optimization.search_spaces.ElasticNet]
alpha = { dist = "uniform", loc = 0.001, scale = 10 }
l1_ratio = { dist = "uniform", loc = 0.05, scale = 0.9 }

[optimization.search_spaces.SVC]
C = { dist = "uniform", loc = 0.01, scale = 100 }
kernel = ["rbf", "poly", "sigmoid"]
