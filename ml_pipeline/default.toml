[[domains.supported]]
label = "Classification multiclasse"
value = "classification_multiclass"
task = "classification"
subtask = "multiclass"

[[domains.supported]]
label = "Régression"
value = "regression_continuous"
task = "regression"
subtask = "continuous"

[[domains.supported]]
