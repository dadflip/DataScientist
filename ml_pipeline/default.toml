learning_rate = { dist = "uniform", loc = 0.01, scale = 0.3 }
max_depth = { dist = "randint", low = 3, high = 10 }
subsample = { dist = "uniform", loc = 0.5, scale = 0.5 }
colsample_bytree = { dist = "uniform", loc = 0.5, scale = 0.5 }

[optimization.search_spaces.XGBRegressor]
n_estimators = { dist = "randint", low = 50, high = 400 }
learning_rate = { dist = "uniform", loc = 0.01, scale = 0.3 }
max_depth = { dist = "randint", low = 3, high = 10 }
subsample = { dist = "uniform", loc = 0.5, scale = 0.5 }
colsample_bytree = { dist = "uniform", loc = 0.5, scale = 0.5 }

[optimization.search_spaces.LGBMClassifier]
n_estimators = { dist = "randint", low = 50, high = 400 }
