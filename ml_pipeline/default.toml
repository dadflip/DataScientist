max_duration_seconds = 3600

[optimization.defaults.scoring]
classification_binary = "roc_auc"
classification_multiclass = "f1_macro"
regression = "r2"

[[optimization.methods]]
label = "RandomizedSearchCV (recommandé)"
value = "randomized"

[[optimization.methods]]
label = "GridSearchCV (exhaustif)"
value = "grid"

[[optimization.methods]]
label = "Bayesian (Optuna)"
value = "bayesian"

[optimization.search_spaces]

[optimization.search_spaces.LogisticRegression]
C = { dist = "uniform", loc = 0.01, scale = 10 }
solver = ["lbfgs", "saga"]
max_iter = [500, 1000, 2000]

[optimization.search_spaces.RandomForestClassifier]
n_estimators = { dist = "randint", low = 50, high = 400 }
max_depth = ["null", 5, 10, 15, 20]
min_samples_split = { dist = "randint", low = 2, high = 15 }
min_samples_leaf = { dist = "randint", low = 1, high = 8 }
max_features = ["sqrt", "log2", 0.5]

[optimization.search_spaces.RandomForestRegressor]
n_estimators = { dist = "randint", low = 50, high = 400 }
max_depth = ["null", 5, 10, 15, 20]
min_samples_split = { dist = "randint", low = 2, high = 15 }
min_samples_leaf = { dist = "randint", low = 1, high = 8 }
max_features = ["sqrt", "log2", 0.5]

[optimization.search_spaces.XGBClassifier]
