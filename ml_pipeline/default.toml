# =============================================================================
# ML Pipeline — Configuration centralisée v2.0
# Source unique de vérité. Sections dans l'ordre d'exécution du pipeline.
# Généré depuis cell0.py → cell16.py
# Format: TOML
# =============================================================================

# ---------------------------------------------------------------------------
# META — Versioning, reproductibilité
# ---------------------------------------------------------------------------
[meta]
version = "2.0.0"
name = "ML Pipeline"
author = ""
description = ""
global_random_state = 42
global_verbose = false

# ---------------------------------------------------------------------------
# ENVIRONMENT — Packages, chemins, logs
# ---------------------------------------------------------------------------
[environment]
log_level = "INFO"
log_file = "pipeline.log"

[environment.paths]
output_dir = "outputs/"
default_submission = "submission.csv"
default_report = "execution_report.html"
default_script = "exported_pipeline.py"
default_models = "trained_models.pkl"

[[environment.packages.groups]]
id = "core"
label = "Core (toujours installé)"
packages = ["pandas", "numpy", "matplotlib", "seaborn", "scikit-learn", "scipy"]
check = ["pandas", "numpy", "matplotlib", "seaborn", "sklearn", "scipy"]
default = true
required = true

[[environment.packages.groups]]
id = "boosting"
label = "Gradient Boosting (XGBoost, LightGBM, CatBoost)"
packages = ["xgboost", "lightgbm", "catboost"]
check = ["xgboost", "lightgbm", "catboost"]
default = true
required = false

[[environment.packages.groups]]
id = "cat_encoders"
label = "Category Encoders"
packages = ["category_encoders"]
check = ["category_encoders"]
default = true
required = false

[[environment.packages.groups]]
id = "torch"
label = "PyTorch"
packages = ["torch", "torchvision"]
check = ["torch", "torchvision"]
default = false
required = false

[[environment.packages.groups]]
id = "transformers"
label = "Transformers (HuggingFace)"
packages = ["transformers", "sentence-transformers", "tokenizers"]
check = ["transformers", "sentence_transformers"]
default = false
required = false

[[environment.packages.groups]]
id = "nlp_classic"
label = "NLP classique (NLTK, spaCy)"
packages = ["nltk", "spacy"]
check = ["nltk", "spacy"]
default = false
required = false

[[environment.packages.groups]]
id = "vision"
label = "Computer Vision (OpenCV, Pillow)"
packages = ["opencv-python-headless", "Pillow"]
check = ["cv2", "PIL"]
default = true
required = false

[[environment.packages.groups]]
id = "graph"
label = "Graph (NetworkX)"
packages = ["networkx"]
check = ["networkx"]
default = true
required = false

[[environment.packages.groups]]
id = "ontology"
label = "Ontologie (rdflib, owlready2)"
packages = ["rdflib", "owlready2"]
check = ["rdflib", "owlready2"]
default = true
required = false

[[environment.packages.groups]]
id = "timeseries"
label = "Séries temporelles (statsmodels, prophet)"
packages = ["statsmodels", "prophet"]
check = ["statsmodels"]
default = false
required = false

[[environment.packages.groups]]
id = "dimreduce"
label = "Réduction dimensionnelle (UMAP)"
packages = ["umap-learn"]
check = ["umap"]
default = false
required = false

[[environment.packages.groups]]
id = "arrow"
label = "Columnar (PyArrow)"
packages = ["pyarrow"]
check = ["pyarrow"]
default = true
required = false

[[environment.packages.groups]]
id = "explainability"
label = "Explicabilité (SHAP, LIME)"
packages = ["shap", "lime"]
check = ["shap", "lime"]
default = false
required = false

[[environment.packages.groups]]
id = "hpo"
label = "Hyperparameter Tuning (Optuna, Hyperopt)"
packages = ["optuna", "hyperopt"]
check = ["optuna", "hyperopt"]
default = false
required = false

[[environment.packages.groups]]
id = "imbalanced"
label = "Données déséquilibrées (imbalanced-learn)"
packages = ["imbalanced-learn"]
check = ["imblearn"]
default = false
required = false

[[environment.packages.groups]]
id = "plotting"
label = "Visualisation avancée (Plotly, Bokeh)"
packages = ["plotly", "bokeh"]
check = ["plotly", "bokeh"]
default = false
required = false

[[environment.packages.groups]]
id = "tracking"
label = "Tracking expériences (MLflow)"
packages = ["mlflow"]
check = ["mlflow"]
default = false
required = false

[[environment.packages.groups]]
id = "utils"
label = "Utilitaires (tqdm, joblib, python-dotenv)"
packages = ["tqdm", "joblib", "python-dotenv"]
check = ["tqdm", "joblib", "dotenv"]
default = true
required = false

# ---------------------------------------------------------------------------
# PIPELINE — Ordre et activation des étapes
# ---------------------------------------------------------------------------
[[pipeline.steps]]
step = "loading"
enabled = true

[[pipeline.steps]]
step = "domains"
enabled = true

[[pipeline.steps]]
step = "eda"
enabled = true

[[pipeline.steps]]
step = "feature_eng"
enabled = true

[[pipeline.steps]]
step = "cleaning"
enabled = true

[[pipeline.steps]]
step = "encoding"
enabled = true

[[pipeline.steps]]
step = "selection"
enabled = true

[[pipeline.steps]]
step = "split"
enabled = true

[[pipeline.steps]]
step = "modeling"
enabled = true

[[pipeline.steps]]
step = "metrics"
enabled = true

[[pipeline.steps]]
step = "optimization"
enabled = false

[[pipeline.steps]]
step = "explain"
enabled = false

[[pipeline.steps]]
step = "export"
enabled = true

# ---------------------------------------------------------------------------
# ÉTAPE 1 — LOADING
# ---------------------------------------------------------------------------
[loading]
encodings = ["utf-8", "utf-8-sig", "latin-1", "cp1252", "iso-8859-1"]
ts_freqs = ["(auto)", "D", "W", "MS", "QS", "AS", "H", "T"]
image_modes = ["RGB", "RGBA", "L", "1"]
graph_formats = ["auto", "graphml", "gml", "edgelist", "adjlist"]
zip_formats = ["csv", "image", "text", "json"]
sklearn_datasets = ["iris", "wine", "breast_cancer", "diabetes", "digits", "california_housing"]

[loading.supported_types]
"CSV (.csv)" = "csv"
"TSV (.tsv)" = "tsv"
"Excel (.xlsx / .xls)" = "excel"
"JSON (.json)" = "json"
"Parquet (.parquet)" = "parquet"
"Feather (.feather)" = "feather"
"HDF5 (.h5 / .hdf)" = "hdf5"
"ORC (.orc)" = "orc"
"SQLite (.db / .sqlite)" = "sqlite"
"Séries temporelles (CSV + colonne datetime)" = "timeseries"
"Image (.png / .jpg / .bmp)" = "image"
"Graphe (.graphml / .gml)" = "graph"
"Texte (.txt)" = "text"
"Ontologie (.owl / .rdf / .ttl)" = "ontology"
"Batch ZIP (dossier de fichiers)" = "zip"
"Presse-papier (coller du CSV)" = "clipboard"
"Dataset sklearn" = "sklearn"

[loading.file_accepts]
csv = ".csv"
tsv = ".tsv"
excel = ".xlsx,.xls"
json = ".json"
parquet = ".parquet"
feather = ".feather"
hdf5 = ".h5,.hdf5"
orc = ".orc"
sqlite = ".db,.sqlite"
timeseries = ".csv"
image = ".png,.jpg,.jpeg,.bmp"
graph = ".graphml,.gml,.txt"
text = ".txt"
ontology = ".owl,.rdf,.ttl"
zip = ".zip"

[[loading.modes]]
label = "Fichier unique"
value = "single"
slots = ["Data"]

[[loading.modes]]
label = "Train / Test"
value = "train_test"
slots = ["Train", "Test"]

[[loading.modes]]
label = "Train / Validation / Test"
value = "train_val_test"
slots = ["Train", "Validation", "Test"]

[[loading.modes]]
label = "Multi-sources hétérogènes"
value = "multi_source"
slots = ["Source A", "Source B", "Source C", "Source D"]

[[loading.modes]]
label = "Personnalisé"
value = "custom"
slots = ["Sources"]

[[loading.mode_configs.single]]
id = "auto_split"
type = "dropdown"
label = "Auto Split"
options = ["None", "Train/Test", "Train/Val/Test"]
value = "None"

[[loading.mode_configs.single]]
id = "test_size"
type = "floatslider"
label = "Test Size %"
value = 0.2
min = 0.01
max = 0.99
step = 0.01

[[loading.mode_configs.single]]
id = "val_size"
type = "floatslider"
label = "Val Size %"
value = 0.1
min = 0.0
max = 0.99
step = 0.01

[[loading.mode_configs.single]]
id = "stratify"
type = "text"
label = "Stratify Col"
value = ""
placeholder = "nom de colonne"

[[loading.mode_configs.train_test]]
id = "align_cols"
type = "checkbox"
label = "Aligner colonnes"
value = false

[[loading.mode_configs.train_val_test]]
id = "align_cols"
type = "checkbox"
label = "Aligner colonnes"
value = false

[[loading.mode_configs.multi_source]]
id = "concat"
type = "checkbox"
label = "Concat auto"
value = false

[[loading.mode_configs.multi_source]]
id = "load_order"
type = "checkbox"
label = "Respecter l'ordre des slots"
value = true
help = "Pour les ontologies avec imports : charger dans l'ordre affiché (base d'abord, dépendantes ensuite)"

# -- Configurations avancées par type de source --
# Commun à tous les types tabulaires
[[loading.adv_configs.csv]]
id = "sep"
type = "text"
description = "Séparateur"
value = ","
placeholder = ","
help = "Caractère séparateur de colonnes (ex: , ; \\t |)"

[[loading.adv_configs.csv]]
id = "enc"
type = "dropdown"
description = "Encodage"
value = "utf-8"
options_key = "encodings"
help = "Encodage du fichier texte"

[[loading.adv_configs.csv]]
id = "header"
type = "dropdown"
description = "Ligne d'en-tête"
value = "infer"
options = ["infer", "0", "None"]
help = "Ligne utilisée comme en-tête (infer = auto, None = pas d'en-tête)"

[[loading.adv_configs.csv]]
id = "skiprows"
type = "text"
description = "Sauter N lignes"
value = ""
placeholder = "0"
help = "Nombre de lignes à ignorer au début"

[[loading.adv_configs.csv]]
id = "nrows"
type = "text"
description = "Nb lignes max"
value = ""
placeholder = "toutes"
help = "Nombre maximum de lignes à charger"

[[loading.adv_configs.csv]]
id = "usecols"
type = "text"
description = "Colonnes (usecols)"
value = ""
placeholder = "col1, col2 ou 0, 1, 2"
help = "Colonnes à garder (noms ou indices séparés par virgule)"

[[loading.adv_configs.csv]]
id = "index_col"
type = "text"
description = "Colonne index"
value = ""
placeholder = "nom ou indice"
help = "Colonne à utiliser comme index"

[[loading.adv_configs.csv]]
id = "parse_dates"
type = "checkbox"
description = "Parser les dates auto"
value = false
help = "Tenter de convertir les colonnes object en datetime"

[[loading.adv_configs.csv]]
id = "sample_frac"
type = "floatslider"
description = "Échantillon (frac)"
value = 1.0
min = 0.01
max = 1.0
step = 0.01
help = "Fraction des lignes à charger (1.0 = tout)"

# TSV — mêmes options que CSV mais séparateur par défaut = tab
[[loading.adv_configs.tsv]]
