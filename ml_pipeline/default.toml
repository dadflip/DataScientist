# ---------------------------------------------------------------------------
# STYLES — CSS et palettes pour l'interface
# (Partagé entre l'app web et les notebooks)
# ---------------------------------------------------------------------------
[styles.palette]
error = "#c0392b"
error_bg = "#fdecea"
error_border = "#e74c3c"
warning = "#d35400"
warning_bg = "#fef9e7"
warning_border = "#f39c12"
info = "#1a5276"
info_bg = "#eaf4fb"
info_border = "#2980b9"
success = "#1e8449"
success_bg = "#eafaf1"
success_border = "#27ae60"
primary = "#2c3e50"
secondary = "#7f8c8d"
header_bg = "#2c3e50"
header_text = "#ecf0f1"
table_header_bg = "#34495e"
table_row_even = "#f8f9fa"
table_row_odd = "#ffffff"
table_border = "#dee2e6"
code_bg = "#f4f6f7"

[styles.css]
global = """
/* ── ML Pipeline UI — global styles ─────────────────────────────────── */

/* Message boxes */
.mlp-msg {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 6px;
    border-left: 4px solid;
    margin: 6px 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.92em;
    line-height: 1.5;
}
.mlp-msg-icon { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }
.mlp-msg-body { flex: 1; }
.mlp-msg-source {
    font-weight: 600;
    margin-right: 4px;
}

.mlp-error   { background: #fdecea; border-color: #e74c3c; color: #c0392b; }
.mlp-warning { background: #fef9e7; border-color: #f39c12; color: #d35400; }
.mlp-info    { background: #eaf4fb; border-color: #2980b9; color: #1a5276; }
.mlp-success { background: #eafaf1; border-color: #27ae60; color: #1e8449; }

/* Section header */
.mlp-section {
    background: #2c3e50;
    color: #ecf0f1;
    padding: 12px 18px;
    border-radius: 6px;
    margin: 12px 0 6px 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.mlp-section h3 {
    margin: 0 0 4px 0;
    font-size: 1.1em;
    font-weight: 700;
    letter-spacing: 0.02em;
}
.mlp-section p {
    margin: 0;
    font-size: 0.88em;
    opacity: 0.85;
}

/* Data preview table */
.mlp-preview {
    width: 100%;
    border-collapse: collapse;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.82em;
    margin: 6px 0;
}
.mlp-preview thead th {
    background: #34495e;
    color: #ecf0f1;
    padding: 6px 10px;
    text-align: left;
    border: 1px solid #dee2e6;
    white-space: nowrap;
}
.mlp-preview tbody tr:nth-child(even) { background: #f8f9fa; }
.mlp-preview tbody tr:nth-child(odd)  { background: #ffffff; }
.mlp-preview tbody td {
    padding: 5px 10px;
    border: 1px solid #dee2e6;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Comparison table */
.mlp-comparison {
    width: 100%;
    border-collapse: collapse;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.88em;
    margin: 6px 0;
}
.mlp-comparison thead th {
    background: #34495e;
    color: #ecf0f1;
    padding: 8px 12px;
    text-align: left;
    border: 1px solid #dee2e6;
}
.mlp-comparison tbody tr:nth-child(even) { background: #f8f9fa; }
.mlp-comparison tbody tr:nth-child(odd)  { background: #ffffff; }
.mlp-comparison tbody td {
    padding: 6px 12px;
    border: 1px solid #dee2e6;
}
.mlp-comparison tbody td:first-child { font-weight: 600; }
"""

[styles.icons]
error = "❌"
warning = "⚠️"
info = "ℹ️"
success = "✅"
